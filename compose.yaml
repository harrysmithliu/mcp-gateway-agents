services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: mcp-gateway-agents-postgres
    environment:
      POSTGRES_DB: mcp_gateway_agents
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d mcp_gateway_agents"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - ./sql/init:/docker-entrypoint-initdb.d
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: mcp-gateway-agents-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
